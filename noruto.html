<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uzumaki Oilasi Iboralari</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #ff6600; /* Naruto rangida */
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 400px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #ff6600;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }
        tr:hover {
            background-color: #fff5ed;
        }
        .hero-name {
            font-weight: bold;
            color: #333;
        }
        .japanese {
            color: #666;
            font-size: 0.9em;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Uzumaki Oilasi Iboralari</h2>
    <table>
        <thead>
            <tr>
                <th>So'z</th>
                <th>Qahramon</th>
                <th>Umumiy ma'nosi</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><strong>Dattebayo</strong> <br><span class="japanese">(だってばよ)</span></td>
                <td class="hero-name">Naruto</td>
                <td>"Gapimga ishon!", "Shunday deyman!"</td>
            </tr>
            <tr>
                <td><strong>Dattebane</strong> <br><span class="japanese">(だってばね)</span></td>
                <td class="hero-name">Kushina</td>
                <td>"Tushunyapsanmi?", "Albatta!" (ayollarga xos)</td>
            </tr>
            <tr>
                <td><strong>Dattebasa</strong> <br><span class="japanese">(だってばさ)</span></td>
                <td class="hero-name">Boruto</td>
                <td>"Albatta-da!", "Xullas shunaqa!"</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
